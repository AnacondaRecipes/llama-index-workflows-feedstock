{% set name = "llama-index-workflows" %}
{% set version = "2.14.2" %}

context:
  name: llama-index-workflows
  version: "2.14.2"

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/llama_index_workflows-{{ version }}.tar.gz
  sha256: b3f17a804c277901d30bc6e1b56398163db182ec48384f79ab16fdc9573b8877

build:
  skip: true # [py<310]
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - uv-build
    - pip
  run:
    - python
    - eval-type-backport >=0.2.2
    - llama-index-instrumentation >=0.1.0
    - pydantic >=2.11.5
    - typing_extensions >=4.6.0
test:
  imports:
    - workflows
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/run-llama/llama_index
  summary: An event-driven, async-first, step-based way to control the execution flow of AI applications like Agents.
  description: |
    Workflows shine when you need to orchestrate complex, multi-step processes
    that involve AI models, APIs, and decision-making. The async-first,
    event-driven architecture makes it easy to build workflows that can route
    between different capabilities, implement parallel processing patterns,
    loop over complex sequences, and maintain state across multiple steps - all
    the features you need to make your AI applications production-ready.
  license: MIT
  license_file: LICENSE
  license_family: MIT
  doc_url: https://developers.llamaindex.ai/python/llamaagents/workflows/
  dev_url: https://github.com/run-llama/workflows-py/tree/main/packages/llama-index-workflows
  

extra:
  recipe-maintainers:
    - jan-janssen
